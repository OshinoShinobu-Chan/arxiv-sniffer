name: Auto Update Docs And Build Site

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: arxiv-sniffer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Sync mkdocs branch content into master workspace
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin --prune

          BASE_BRANCH="master"
          if ! git ls-remote --exit-code --heads origin "${BASE_BRANCH}" >/dev/null 2>&1; then
            BASE_BRANCH="main"
          fi

          git checkout -B "${BASE_BRANCH}" "origin/${BASE_BRANCH}"

          if git ls-remote --exit-code --heads origin mkdocs >/dev/null 2>&1; then
            TMP_MKDOCS_DIR="$(mktemp -d)"
            git archive --format=tar origin/mkdocs | tar -xf - -C "${TMP_MKDOCS_DIR}"

            rm -rf mkdocs
            mkdir -p mkdocs
            rsync -a --delete "${TMP_MKDOCS_DIR}/" mkdocs/

            rm -rf "${TMP_MKDOCS_DIR}"
          else
            echo "mkdocs branch does not exist yet, use ${BASE_BRANCH}/mkdocs as initial content"
          fi

      - name: Run generator
        env:
          DEEPSEEK_API_KEY_FROM_SECRET: ${{ secrets.DEEPSEEK_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          export DEEPSEEK_API_KEY="${DEEPSEEK_API_KEY_FROM_SECRET}"
          if [[ -z "${DEEPSEEK_API_KEY}" ]]; then
            echo "DEEPSEEK_API_KEY is empty. Please configure repository secret DEEPSEEK_API_KEY."
            exit 1
          fi
          cargo run

      - name: Commit and push mkdocs branch changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf .mkdocs-branch
          git worktree add .mkdocs-branch --detach

          cd .mkdocs-branch
          if git ls-remote --exit-code --heads origin mkdocs >/dev/null 2>&1; then
            git checkout -B mkdocs origin/mkdocs
          else
            git checkout --orphan mkdocs
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r ../mkdocs/. .

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit on mkdocs branch"
          else
            git add -A
            git commit -m "chore: auto update mkdocs content"
            git push origin mkdocs
          fi

      - name: Build MkDocs site
        run: |
          cd .mkdocs-branch
          mkdocs build --clean

      - name: Publish site branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin --prune

          rm -rf .site-branch
          git worktree add .site-branch --detach

          cd .site-branch
          if git ls-remote --exit-code --heads origin site >/dev/null 2>&1; then
            git checkout -B site origin/site
          else
            git checkout --orphan site
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r ../.mkdocs-branch/site/. .
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit on site branch"
          else
            git commit -m "chore: auto publish mkdocs site"
            git push origin site
          fi

